<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="color-scheme" content="light"/>
  <title>Debug 2</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    html,body{background:#fff !important;color:#000 !important;font-family:'Segoe UI',sans-serif;font-size:12px;padding:12px;}
    .row{padding:4px 0;border-bottom:1px solid #eee;}
    .ok{color:green;} .err{color:red;} .warn{color:orange;}
    button{margin:6px 4px 0 0;padding:6px 12px;background:#0078d4;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;}
    #log{margin-top:10px;background:#f3f2f1;padding:8px;font-size:11px;white-space:pre-wrap;max-height:300px;overflow-y:auto;}
  </style>
</head>
<body>
<div id="out"></div>
<button onclick="testFrom()">Test From</button>
<button onclick="testBodyText()">Test Body (Text)</button>
<button onclick="testBodyHtml()">Test Body (HTML)</button>
<button onclick="testBodyDelay()">Test Body (2s delay)</button>
<div id="log"></div>
<script>
  var logs = [];
  function log(msg){ logs.push(new Date().toISOString().substr(11,8)+" "+msg); document.getElementById("log").textContent=logs.join("\n"); }
  function add(label,val,cls){ document.getElementById("out").innerHTML += '<div class="row"><b>'+label+':</b> <span class="'+(cls||"")+'">'+val+'</span></div>'; }

  Office.onReady(function(info){
    log("onReady: host="+info.host+" platform="+info.platform);
    var item = Office.context.mailbox.item;
    if(!item){ log("ERROR: item is null"); return; }
    log("item ok, subject="+item.subject);
    add("Subject", item.subject, "ok");
    add("ItemId", item.itemId ? item.itemId.substr(0,20)+"..." : "null", item.itemId?"ok":"err");
    add("ItemType", item.itemType, "ok");
  });

  function testFrom(){
    log("--- testFrom ---");
    var item = Office.context.mailbox.item;
    item.from.getAsync(function(r){
      log("from callback fired, status="+r.status);
      if(r.status===Office.AsyncResultStatus.Succeeded){
        log("from="+r.value.emailAddress);
        add("From", r.value.displayName+" <"+r.value.emailAddress+">", "ok");
      } else {
        log("from error="+JSON.stringify(r.error));
        add("From Error", JSON.stringify(r.error), "err");
      }
    });
    log("from.getAsync called, waiting for callback...");
  }

  function testBodyText(){
    log("--- testBodyText ---");
    var item = Office.context.mailbox.item;
    item.body.getAsync(Office.CoercionType.Text, function(r){
      log("body(Text) callback fired, status="+r.status);
      if(r.status===Office.AsyncResultStatus.Succeeded){
        log("body length="+r.value.length);
        add("Body (Text)", "Length: "+r.value.length+" — "+r.value.substr(0,80), "ok");
      } else {
        log("body error="+JSON.stringify(r.error));
        add("Body (Text) Error", JSON.stringify(r.error), "err");
      }
    });
    log("body.getAsync(Text) called, waiting...");
  }

  function testBodyHtml(){
    log("--- testBodyHtml ---");
    var item = Office.context.mailbox.item;
    item.body.getAsync(Office.CoercionType.Html, function(r){
      log("body(Html) callback fired, status="+r.status);
      if(r.status===Office.AsyncResultStatus.Succeeded){
        log("body html length="+r.value.length);
        add("Body (HTML)", "Length: "+r.value.length, "ok");
      } else {
        log("body html error="+JSON.stringify(r.error));
        add("Body (HTML) Error", JSON.stringify(r.error), "err");
      }
    });
    log("body.getAsync(Html) called, waiting...");
  }

  function testBodyDelay(){
    log("--- testBodyDelay (2s) ---");
    setTimeout(function(){
      log("2s passed, calling getAsync now...");
      var item = Office.context.mailbox.item;
      item.body.getAsync(Office.CoercionType.Text, function(r){
        log("delayed body callback fired, status="+r.status);
        if(r.status===Office.AsyncResultStatus.Succeeded){
          log("body ok, length="+r.value.length);
          add("Body (Delayed)", "✅ Length: "+r.value.length, "ok");
        } else {
          log("body error="+JSON.stringify(r.error));
          add("Body (Delayed) Error", JSON.stringify(r.error), "err");
        }
      });
    }, 2000);
    log("waiting 2 seconds...");
  }
</script>
</body>
</html>
