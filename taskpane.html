<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ticket Manager</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    :root {
      --blue: #0078d4;
      --blue-light: #deecf9;
      --blue-dark: #005a9e;
      --green: #107c10;
      --green-light: #dff6dd;
      --orange: #d83b01;
      --orange-light: #fed9cc;
      --gray-50: #f8f8f8;
      --gray-100: #f3f2f1;
      --gray-200: #edebe9;
      --gray-300: #d2d0ce;
      --gray-400: #a19f9d;
      --gray-600: #605e5c;
      --gray-900: #201f1e;
      --radius: 4px;
      --font: 'Segoe UI', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      font-size: 13px;
      color: var(--gray-900);
      background: #fff;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--blue);
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.2);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header p { font-size: 11px; opacity: 0.85; }

    /* Email info bar */
    .email-bar {
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
      padding: 10px 16px;
    }
    .email-subject {
      font-weight: 600;
      font-size: 12px;
      color: var(--gray-900);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .email-from {
      font-size: 11px;
      color: var(--gray-600);
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--gray-200);
      background: #fff;
    }
    .tab {
      flex: 1;
      padding: 9px 0;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      color: var(--gray-600);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }
    .tab:hover:not(.active) { background: var(--gray-100); }

    /* Panels */
    .panel { display: none; padding: 14px 16px; }
    .panel.active { display: block; }

    /* Form */
    .field { margin-bottom: 12px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-600);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    input[type="text"], select, textarea {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 12px;
      color: var(--gray-900);
      background: #fff;
      transition: border-color 0.1s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 1px var(--blue);
    }
    textarea { resize: vertical; min-height: 70px; }

    .ticket-number-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ticket-number-row input { flex: 1; font-weight: 600; font-size: 13px; }
    .btn-gen {
      padding: 6px 10px;
      background: var(--gray-100);
      border: 1px solid var(--gray-300);
      border-radius: var(--radius);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      color: var(--gray-900);
    }
    .btn-gen:hover { background: var(--gray-200); }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Priority badges */
    .priority-select { appearance: none; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .badge-low { background: var(--green-light); color: var(--green); }
    .badge-medium { background: #fff4ce; color: #7a5c00; }
    .badge-high { background: var(--orange-light); color: var(--orange); }
    .badge-critical { background: #fde7e9; color: #a4262c; }
    .badge-open { background: var(--blue-light); color: var(--blue-dark); }
    .badge-closed { background: var(--gray-200); color: var(--gray-600); }

    /* Submit button */
    .btn-primary {
      width: 100%;
      padding: 9px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-primary:active { transform: scale(0.99); }

    /* Success toast */
    .toast {
      display: none;
      background: var(--green-light);
      border: 1px solid #bad3b7;
      border-left: 3px solid var(--green);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 12px;
      color: #0a4d0a;
      margin-top: 10px;
    }
    .toast.show { display: flex; align-items: center; gap: 8px; }
    .toast-icon { font-size: 15px; }

    /* Ticket list */
    .search-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .search-bar input { flex: 1; }
    .ticket-list { display: flex; flex-direction: column; gap: 6px; }
    .ticket-card {
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.1s;
      background: #fff;
    }
    .ticket-card:hover { border-color: var(--blue); background: var(--blue-light); }
    .ticket-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
    }
    .ticket-id { font-size: 11px; font-weight: 700; color: var(--blue); }
    .ticket-title { font-size: 12px; font-weight: 600; color: var(--gray-900); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ticket-meta { font-size: 11px; color: var(--gray-600); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 30px 16px;
      color: var(--gray-400);
    }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }
    .empty p { font-size: 12px; }

    /* Section divider */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--gray-400);
      margin: 14px 0 6px;
    }
    .section-label:first-of-type { margin-top: 0; }

    /* Assignee row */
    .assignees {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--blue);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.1s;
    }
    .avatar.selected { border-color: var(--blue-dark); box-shadow: 0 0 0 1px var(--blue); }
    .avatar:nth-child(2) { background: #7719aa; }
    .avatar:nth-child(3) { background: var(--green); }
    .avatar:nth-child(4) { background: #d83b01; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-icon">🎫</div>
  <div>
    <h1>Ticket Manager</h1>
    <p>Support & Helpdesk</p>
  </div>
</div>

<div class="email-bar">
  <div class="email-subject" id="emailSubject">Loading email...</div>
  <div class="email-from" id="emailFrom"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('create')">+ Create Ticket</div>
  <div class="tab" onclick="switchTab('tickets')">All Tickets</div>
</div>

<!-- CREATE TICKET PANEL -->
<div class="panel active" id="panel-create">

  <div class="section-label">Ticket Number</div>
  <div class="field">
    <div class="ticket-number-row">
      <input type="text" id="ticketNumber" placeholder="e.g. TKT-0042" readonly style="background:var(--gray-50)"/>
      <button class="btn-gen" onclick="generateTicketNumber()">Auto-generate</button>
    </div>
  </div>

  <div class="field">
    <label>Title</label>
    <input type="text" id="ticketTitle" placeholder="Brief description of the issue"/>
  </div>

  <div class="row2">
    <div class="field">
      <label>Priority</label>
      <select id="ticketPriority">
        <option value="low">🟢 Low</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="high">🟠 High</option>
        <option value="critical">🔴 Critical</option>
      </select>
    </div>
    <div class="field">
      <label>Category</label>
      <select id="ticketCategory">
        <option value="support">Support</option>
        <option value="billing">Billing</option>
        <option value="technical">Technical</option>
        <option value="feature">Feature Request</option>
        <option value="other">Other</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label>Assign To</label>
    <div class="assignees">
      <div class="avatar" title="Alice" onclick="toggleAssignee(this)">AL</div>
      <div class="avatar" title="Bob" onclick="toggleAssignee(this)">BO</div>
      <div class="avatar" title="Carol" onclick="toggleAssignee(this)">CA</div>
      <div class="avatar" title="Dan" onclick="toggleAssignee(this)">DA</div>
    </div>
  </div>

  <div class="field">
    <label>Notes</label>
    <textarea id="ticketNotes" placeholder="Additional context or internal notes..."></textarea>
  </div>

  <button class="btn-primary" onclick="createTicket()">Create Ticket</button>

  <div class="toast" id="successToast">
    <span class="toast-icon">✅</span>
    <span id="toastMsg">Ticket created successfully!</span>
  </div>
</div>

<!-- ALL TICKETS PANEL -->
<div class="panel" id="panel-tickets">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search tickets..." oninput="filterTickets()"/>
  </div>
  <div class="ticket-list" id="ticketList">
    <div class="empty">
      <div class="empty-icon">🗂️</div>
      <p>No tickets yet.<br>Create one from the current email.</p>
    </div>
  </div>
</div>

<script>
  let tickets = JSON.parse(localStorage.getItem('outlook_tickets') || '[]');
  let ticketCounter = parseInt(localStorage.getItem('outlook_ticket_counter') || '41');

  // ── Office.js init ──────────────────────────────────────────
  Office.onReady(function(info) {
    if (info.host === Office.HostType.Outlook) {
      loadEmailInfo();
    } else {
      // Dev/preview mode — use mock data
      document.getElementById('emailSubject').textContent = 'Re: Invoice not received for order #4821';
      document.getElementById('emailFrom').textContent = 'From: john.smith@clientco.com';
      document.getElementById('ticketTitle').value = 'Invoice not received for order #4821';
    }
    renderTicketList();
    generateTicketNumber();
  });

  function loadEmailInfo() {
    const item = Office.context.mailbox.item;
    const subject = item.subject || '(No subject)';
    document.getElementById('emailSubject').textContent = subject;
    document.getElementById('ticketTitle').value = subject;

    item.from.getAsync(function(result) {
      if (result.status === Office.AsyncResultStatus.Succeeded) {
        const sender = result.value;
        document.getElementById('emailFrom').textContent =
          'From: ' + (sender.displayName || sender.emailAddress);
      }
    });
  }

  // ── Tab switching ───────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && name === 'create') || (i === 1 && name === 'tickets'));
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    if (name === 'tickets') renderTicketList();
  }

  // ── Ticket number ───────────────────────────────────────────
  function generateTicketNumber() {
    ticketCounter++;
    localStorage.setItem('outlook_ticket_counter', ticketCounter);
    document.getElementById('ticketNumber').value = 'TKT-' + String(ticketCounter).padStart(4, '0');
  }

  // ── Assignee toggle ─────────────────────────────────────────
  function toggleAssignee(el) {
    el.classList.toggle('selected');
  }

  // ── Create ticket ───────────────────────────────────────────
  function createTicket() {
    const number = document.getElementById('ticketNumber').value.trim();
    const title = document.getElementById('ticketTitle').value.trim();
    if (!number || !title) {
      alert('Please fill in the Ticket Number and Title.');
      return;
    }

    const assigned = Array.from(document.querySelectorAll('.avatar.selected')).map(a => a.title);

    const ticket = {
      id: number,
      title: title,
      priority: document.getElementById('ticketPriority').value,
      category: document.getElementById('ticketCategory').value,
      assignees: assigned,
      notes: document.getElementById('ticketNotes').value.trim(),
      status: 'open',
      from: document.getElementById('emailFrom').textContent.replace('From: ', ''),
      subject: document.getElementById('emailSubject').textContent,
      created: new Date().toISOString()
    };

    tickets.unshift(ticket);
    localStorage.setItem('outlook_tickets', JSON.stringify(tickets));

    const toast = document.getElementById('successToast');
    document.getElementById('toastMsg').textContent = number + ' created successfully!';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);

    // Reset for next email
    document.querySelectorAll('.avatar.selected').forEach(a => a.classList.remove('selected'));
    document.getElementById('ticketNotes').value = '';
    generateTicketNumber();
  }

  // ── Ticket list ─────────────────────────────────────────────
  function priorityBadge(p) {
    const map = { low: 'badge-low', medium: '', high: 'badge-high', critical: 'badge-critical' };
    const labels = { low: 'Low', medium: 'Medium', high: 'High', critical: 'Critical' };
    return `<span class="badge ${map[p]}" style="${p==='medium'?'background:#fff4ce;color:#7a5c00':''}">${labels[p]}</span>`;
  }

  function renderTicketList(filter = '') {
    const list = document.getElementById('ticketList');
    const filtered = tickets.filter(t =>
      t.id.toLowerCase().includes(filter.toLowerCase()) ||
      t.title.toLowerCase().includes(filter.toLowerCase()) ||
      (t.from || '').toLowerCase().includes(filter.toLowerCase())
    );

    if (!filtered.length) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">🗂️</div><p>${filter ? 'No matching tickets.' : 'No tickets yet.<br>Create one from the current email.'}</p></div>`;
      return;
    }

    list.innerHTML = filtered.map(t => {
      const date = new Date(t.created).toLocaleDateString('en-CA');
      const assignStr = t.assignees && t.assignees.length ? t.assignees.join(', ') : 'Unassigned';
      return `
        <div class="ticket-card">
          <div class="ticket-card-top">
            <span class="ticket-id">${t.id}</span>
            ${priorityBadge(t.priority)}
          </div>
          <div class="ticket-title">${t.title}</div>
          <div class="ticket-meta">
            <span class="badge badge-open">${t.status}</span>
            <span>${t.category}</span>
            <span>· ${assignStr}</span>
            <span>· ${date}</span>
          </div>
        </div>`;
    }).join('');
  }

  function filterTickets() {
    renderTicketList(document.getElementById('searchInput').value);
  }
</script>
</body>
</html>
